<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>NEON KINETICISM - Tic Tac Toe</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="game-body">
    <!-- TopAppBar -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                NEON KINETICISM
            </div>
            <div class="nav-links">
                <a class="active" href="#">Game</a>
                <a href="#">Leaderboard</a>
            </div>
            <div class="nav-right">
                <button class="nav-btn">
                    <span class="material-symbols-outlined" data-icon="settings">settings</span>
                </button>
                <button class="nav-btn">
                    <span class="material-symbols-outlined" data-icon="help">help</span>
                </button>
                <div class="profile-img">
                    <img alt="Player Profile" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCYexbk9vHmX-fvJ0HGqnemJgvvlN5IPRmbRk-gT2NFbO6mqhx49A1_hPyhC8PLEjzTWFrUhWudty81EBOW_UwrokujJoCxcOLS5p2L5V1Tz6xR4A4sS766vwfPiOEYgwXVfQy7v46h1WwVMA3N04vk3ar7v8AnTD_hEE8rx_fM8DSIQwVLRwRK8aKF4t4e9SHuSsu1iR4JtCHJXlB4DM7wbwwi0Vh3S1H93ky4no_jpS653cC3X15Lq8GuuLhfFMeB1I03CKwe95X6"/>
                </div>
            </div>
        </div>
    </nav>

    <main class="game-container">
        <!-- Turn Indicator & Scoreboard Bento -->
        <div class="scoreboard-grid">
            <!-- Game Progress -->
            <div class="turn-indicator">
                <span class="material-symbols-outlined pulse" data-icon="sports_esports">sports_esports</span>
                <span id="gameProgress">Game 1 of 5</span>
            </div>
            <!-- Turn Status -->
            <div class="turn-indicator">
                <span class="material-symbols-outlined pulse" data-icon="swords">swords</span>
                <span id="turnText">PLAYER X'S TURN</span>
            </div>
            <!-- Player X Card -->
            <div class="score-card player-x">
                <span class="text-label-sm text-on-surface-variant font-medium tracking-widest uppercase">Player X</span>
                <span id="scoreX" class="score x-text">00</span>
            </div>
            <!-- Player O Card -->
            <div class="score-card player-o">
                <span class="text-label-sm text-on-surface-variant font-medium tracking-widest uppercase">Player O</span>
                <span id="scoreO" class="score o-text">00</span>
            </div>
        </div>

        <!-- The Game Grid -->
        <div class="game-board-wrapper">
            <!-- Grid Background bleed -->
            <div id="gameGrid" class="game-grid">
                <!-- Game cells will be generated by JavaScript -->
            </div>
        </div>

        <!-- Game Result Modal -->
        <div id="gameResultModal" class="modal-overlay hidden">
            <div class="modal-content slide-in">
                <h2 id="resultTitle" class="modal-title"></h2>
                <p id="resultMessage" class="modal-message"></p>
                <div class="modal-buttons">
                    <button onclick="game.resetGame()" class="modal-btn modal-btn-primary">
                        Play Again
                    </button>
                    <button onclick="game.newMatch()" class="modal-btn modal-btn-secondary">
                        New Match
                    </button>
                </div>
            </div>
        </div>

        <!-- Action Bar -->
        <div class="action-buttons">
            <button onclick="game.resetGame()" class="btn-reset">
                <span class="material-symbols-outlined" data-icon="refresh">refresh</span>
                RESET GAME
            </button>
            <button onclick="game.newMatch()" class="btn-new">
                NEW MATCH
            </button>
        </div>
    </main>

    <!-- BottomNavBar (Mobile Only) -->
    <div class="bottom-nav">
        <a class="nav-item active" href="#">
            <span class="material-symbols-outlined" data-icon="grid_3x3">grid_3x3</span>
            <span>Play</span>
        </a>
        <a class="nav-item" href="#">
            <span class="material-symbols-outlined" data-icon="emoji_events">emoji_events</span>
            <span>Results</span>
        </a>
        <a class="nav-item" href="#">
            <span class="material-symbols-outlined" data-icon="leaderboard">leaderboard</span>
            <span>Ranks</span>
        </a>
    </div>

    <!-- Hidden padding to prevent content from being cut off by bottom nav -->
    <div class="md:hidden h-24"></div>

    <script>
        class TicTacToeGame {
            constructor() {
                this.board = Array(9).fill('');
                this.currentPlayer = 'X';
                this.gameActive = true;
                this.scores = { X: 0, O: 0 };
                this.gamesPlayed = 0;
                this.maxGames = 5;
                this.winningConditions = [
                    [0, 1, 2], [3, 4, 5], [6, 7, 8], // Rows
                    [0, 3, 6], [1, 4, 7], [2, 5, 8], // Columns
                    [0, 4, 8], [2, 4, 6] // Diagonals
                ];
                this.initGame();
            }

            initGame() {
                this.createGameGrid();
                this.updateDisplay();
                this.loadScores();
            }

            createGameGrid() {
                const gameGrid = document.getElementById('gameGrid');
                gameGrid.innerHTML = '';
                
                for (let i = 0; i < 9; i++) {
                    const cell = document.createElement('button');
                    cell.className = 'cell';
                    cell.setAttribute('data-cell-index', i);
                    cell.addEventListener('click', () => this.handleCellClick(i));
                    gameGrid.appendChild(cell);
                }
            }

            handleCellClick(cellIndex) {
                if (this.board[cellIndex] !== '' || !this.gameActive) {
                    return;
                }

                this.board[cellIndex] = this.currentPlayer;
                this.updateCell(cellIndex);
                this.checkResult();
            }

            updateCell(cellIndex) {
                const cell = document.querySelector(`[data-cell-index="${cellIndex}"]`);
                const value = this.board[cellIndex];
                
                if (value === 'X') {
                    cell.innerHTML = `<span class="glow-primary">X</span>`;
                } else if (value === 'O') {
                    cell.innerHTML = `<span class="glow-secondary">O</span>`;
                }
            }

            checkResult() {
                let roundWon = false;
                let winningCombination = [];

                for (let i = 0; i < this.winningConditions.length; i++) {
                    const [a, b, c] = this.winningConditions[i];
                    if (this.board[a] && this.board[a] === this.board[b] && this.board[a] === this.board[c]) {
                        roundWon = true;
                        winningCombination = [a, b, c];
                        break;
                    }
                }

                if (roundWon) {
                    this.gameActive = false;
                    this.highlightWinningCells(winningCombination);
                    this.scores[this.currentPlayer]++;
                    this.updateScores();
                    this.saveScores();
                    setTimeout(() => this.showGameResult(true), 500);
                    return;
                }

                if (!this.board.includes('')) {
                    this.gameActive = false;
                    setTimeout(() => this.showGameResult(false), 500);
                    return;
                }

                this.currentPlayer = this.currentPlayer === 'X' ? 'O' : 'X';
                this.updateTurnIndicator();
            }

            highlightWinningCells(cells) {
                cells.forEach(index => {
                    const cell = document.querySelector(`[data-cell-index="${index}"]`);
                    cell.classList.add('winning-cell', 'active-cell');
                });
            }

            updateTurnIndicator() {
                const turnText = document.getElementById('turnText');
                turnText.textContent = `PLAYER ${this.currentPlayer}'S TURN`;
                
                const turnIndicator = document.querySelector('.turn-indicator');
                turnIndicator.classList.remove('slide-in');
                void turnIndicator.offsetWidth; // Trigger reflow
                turnIndicator.classList.add('slide-in');
            }

            updateDisplay() {
                this.updateTurnIndicator();
                this.updateScores();
                this.updateGameProgress();
            }

            updateGameProgress() {
                const gameProgress = document.getElementById('gameProgress');
                gameProgress.textContent = `Game ${this.gamesPlayed + 1} of ${this.maxGames}`;
            }

            updateScores() {
                document.getElementById('scoreX').textContent = String(this.scores.X).padStart(2, '0');
                document.getElementById('scoreO').textContent = String(this.scores.O).padStart(2, '0');
            }

            showGameResult(won) {
                const modal = document.getElementById('gameResultModal');
                const title = document.getElementById('resultTitle');
                const message = document.getElementById('resultMessage');

                this.gamesPlayed++;

                if (won) {
                    title.textContent = `Player ${this.currentPlayer} Wins!`;
                    title.className = 'modal-title x-text';
                    message.textContent = `Congratulations! Player ${this.currentPlayer} has won this round.`;
                } else {
                    title.textContent = "It's a Draw!";
                    title.className = 'modal-title';
                    title.style.color = 'var(--tertiary-container)';
                    message.textContent = "The game ended in a draw. Well played both!";
                }

                // Add games played info
                message.textContent += ` (Game ${this.gamesPlayed} of ${this.maxGames})`;

                // Check if match is complete
                if (this.gamesPlayed >= this.maxGames) {
                    // Show match winner and force new match
                    setTimeout(() => {
                        this.showMatchResult();
                    }, 2000);
                }

                modal.classList.remove('hidden');
            }

            showMatchResult() {
                const modal = document.getElementById('gameResultModal');
                const title = document.getElementById('resultTitle');
                const message = document.getElementById('resultMessage');
                const modalButtons = document.querySelector('.modal-buttons');

                // Hide current modal temporarily
                modal.classList.add('hidden');

                // Determine match winner
                let matchWinner = '';
                let winnerColor = '';
                
                if (this.scores.X > this.scores.O) {
                    matchWinner = 'Player X';
                    winnerColor = 'x-text';
                } else if (this.scores.O > this.scores.X) {
                    matchWinner = 'Player O';
                    winnerColor = 'o-text';
                } else {
                    matchWinner = "It's a tie";
                    winnerColor = '';
                }

                // Update modal for match result
                title.textContent = 'Match Complete!';
                title.className = 'modal-title ' + winnerColor;
                if (winnerColor === '') {
                    title.style.color = 'var(--tertiary-container)';
                }

                message.textContent = `${matchWinner} wins the match! Final score: X (${this.scores.X}) - O (${this.scores.O})`;

                // Show only "New Match" button
                modalButtons.innerHTML = `
                    <button onclick="game.newMatch()" class="modal-btn modal-btn-primary">
                        Start New Match
                    </button>
                `;

                // Show modal again
                modal.classList.remove('hidden');
            }

            resetGame() {
                // Check if match is complete
                if (this.gamesPlayed >= this.maxGames) {
                    this.showMatchResult();
                    return;
                }

                this.board = Array(9).fill('');
                this.currentPlayer = 'X';
                this.gameActive = true;
                
                // Clear the grid
                const cells = document.querySelectorAll('[data-cell-index]');
                cells.forEach(cell => {
                    cell.innerHTML = '';
                    cell.classList.remove('winning-cell', 'active-cell');
                });

                // Hide modal
                document.getElementById('gameResultModal').classList.add('hidden');
                
                this.updateDisplay();
            }

            newMatch() {
                this.scores = { X: 0, O: 0 };
                this.gamesPlayed = 0;
                this.saveScores();
                this.resetGame();
                
                // Restore modal buttons to original state
                const modalButtons = document.querySelector('.modal-buttons');
                modalButtons.innerHTML = `
                    <button onclick="game.resetGame()" class="modal-btn modal-btn-primary">
                        Play Again
                    </button>
                    <button onclick="game.newMatch()" class="modal-btn modal-btn-secondary">
                        New Match
                    </button>
                `;
            }

            saveScores() {
                localStorage.setItem('ticTacToeScores', JSON.stringify(this.scores));
            }

            loadScores() {
                const savedScores = localStorage.getItem('ticTacToeScores');
                if (savedScores) {
                    this.scores = JSON.parse(savedScores);
                    this.updateScores();
                }
            }
        }

        // Initialize game when page loads
        document.addEventListener('DOMContentLoaded', () => {
            window.game = new TicTacToeGame();
        });
    </script>
</body>
</html>
